<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#05070b">
    <meta
      name="description"
      content="A tactile Three.js solar system with orbit controls, live scale modes, and planet data."
    >
    <title>3D Solar System Lab</title>
    <link rel="icon" type="image/png" href="img/sun.png">
    <link rel="stylesheet" href="css/styles.css">
    <script type="importmap">
      {
        "imports": {
          "three": "./node_modules/three/build/three.module.js",
          "three/addons/": "./node_modules/three/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <canvas
      id="scene"
      aria-label="Interactive 3D model of the solar system"
    ></canvas>

    <div id="labels" class="scene-labels" aria-hidden="true"></div>

    <div class="ui-shell">
      <header class="topbar" aria-label="Application header">
        <a class="brand" href="#" aria-label="3D Solar System Lab home">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>
            <strong>Solar System</strong>
            <small>3D Lab</small>
          </span>
        </a>

        <div class="status-cluster" aria-label="Scene status">
          <span class="status-dot" aria-hidden="true"></span>
          <span>Live WebGL</span>
        </div>
      </header>

      <aside class="panel orbit-panel" aria-label="Planet selector">
        <div class="panel-heading">
          <p>Orbit Focus</p>
          <span id="planet-count">9 bodies</span>
        </div>
        <div id="planet-list" class="planet-list"></div>
      </aside>

      <aside class="panel details-panel" aria-live="polite">
        <div class="panel-heading">
          <p>Selected Body</p>
          <span id="scale-mode-readout">Balanced</span>
        </div>

        <div class="body-profile">
          <span id="selected-kicker">Planet</span>
          <h1 id="selected-name">Earth</h1>
          <p id="selected-summary">
            Blue world with a single moon and the reference point for this model.
          </p>
        </div>

        <dl class="metric-grid">
          <div>
            <dt>Distance</dt>
            <dd id="selected-distance">1.00 AU</dd>
          </div>
          <div>
            <dt>Radius</dt>
            <dd id="selected-radius">6,371 km</dd>
          </div>
          <div>
            <dt>Orbit</dt>
            <dd id="selected-orbit">365.2 days</dd>
          </div>
          <div>
            <dt>Velocity</dt>
            <dd id="selected-velocity">107,218 km/h</dd>
          </div>
        </dl>
      </aside>

      <nav class="control-dock" aria-label="Scene controls">
        <div class="control-group segmented" aria-label="Scale mode">
          <button class="mode-button active" type="button" data-scale="balanced">
            Balanced
          </button>
          <button class="mode-button" type="button" data-scale="distance">
            Distance
          </button>
          <button class="mode-button" type="button" data-scale="size">
            Size
          </button>
        </div>

        <label class="speed-control">
          <span>Speed</span>
          <input
            id="speed-range"
            type="range"
            min="0"
            max="4"
            value="1"
            step="0.1"
            aria-label="Orbit speed"
          >
          <output id="speed-value" for="speed-range">1.0x</output>
        </label>

        <div class="control-group">
          <button id="toggle-motion" class="icon-button" type="button" aria-pressed="false">
            <span class="pause-icon" aria-hidden="true"></span>
            <span>Pause</span>
          </button>
          <button class="camera-button" type="button" data-camera="overview">
            Overview
          </button>
          <button class="camera-button" type="button" data-camera="inner">
            Inner
          </button>
          <button class="camera-button" type="button" data-camera="outer">
            Outer
          </button>
        </div>
      </nav>
    </div>

    <noscript>
      <p class="no-script">
        This 3D solar system needs JavaScript enabled.
      </p>
    </noscript>

    <script type="module" src="js/scripts.js"></script>
  </body>
</html>
